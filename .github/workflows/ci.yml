name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Build & test (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.4', '8.5']

    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: pcntl, posix, readline
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Build
        run: composer build

      - name: Static analysis
        run: composer phpstan

      - name: Test
        run: composer test

  coverage:
    name: Coverage (PHP 8.4)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pcntl, posix, readline
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v6
        with:
          path: vendor
          key: composer-8.4-${{ hashFiles('composer.lock') }}
          restore-keys: composer-8.4-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress

      - name: Build
        run: composer build

      - name: Coverage
        run: |
          composer test:coverage | tee coverage.txt
          {
            echo '## Test coverage'
            echo '```'
            grep -A30 'Code Coverage Report' coverage.txt || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

  release-script:
    name: Release script tests (bashunit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install & run bashunit
        uses: TypedDevs/bashunit@main
        with:
          version: 0.39.1
          args: tests/bash
